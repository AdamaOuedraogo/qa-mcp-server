<svg xmlns="http://www.w3.org/2000/svg" width="680" height="546" viewBox="0 0 680 546" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<title>Agentic direction for qa-mcp-server</title>
<desc>A multi-agent framework such as CrewAI or LangGraph orchestrates specialized agents (researcher, tester, analyst), which reach the qa-mcp-server through the MCP protocol. The server exposes three MCP primitives: Tools (Playwright, Cypress, Reports), Resources (QA knowledge, documentation) and Prompts (QA workflows).</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect x="140" y="40" width="400" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="62" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Multi-agent framework</text>
<text x="340" y="80" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#534AB7">e.g. CrewAI, LangGraph — orchestrates agents</text>

<line x1="340" y1="96" x2="162" y2="150" stroke="#73726c" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="340" y1="96" x2="340" y2="150" stroke="#73726c" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
