<text x="160" y="190" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#0F6E56">Finds specs</text>

<rect x="265" y="150" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="340" y="172" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Tester</text>
<text x="340" y="190" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#0F6E56">Writes tests</text>

<rect x="445" y="150" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
