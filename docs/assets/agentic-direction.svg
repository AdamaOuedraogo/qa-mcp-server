<line x1="340" y1="206" x2="340" y2="250" stroke="#73726c" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="520" y1="206" x2="360" y2="250" stroke="#73726c" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

